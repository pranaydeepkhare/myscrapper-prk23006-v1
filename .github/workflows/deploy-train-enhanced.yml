name: Deploy Enhanced Training (Random Forest)
# Location: .github/workflows/deploy-train-enhanced.yml

on:
  workflow_dispatch:
  push:
    paths:
      - 'cloud_function/train-enhanced/**'

permissions:
  id-token: write
  contents: read

env:
  PROJECT_ID: ${{ vars.PROJECT_ID }}
  REGION: ${{ vars.REGION }}
  FUNCTION_NAME: train-enhanced
  WORKLOAD_IDENTITY_PROVIDER: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
  DEPLOYER_SA: ${{ vars.DEPLOYER_SA }}
  # FIX for Node.js deprecation warning
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}

      - name: Deploy Cloud Function
        run: |
          gcloud functions deploy ${{ env.FUNCTION_NAME }} \
            --gen2 \
            --runtime=python311 \
            --region=${{ env.REGION }} \
            --source=cloud_function/train-enhanced \
            --entry-point=train_enhanced_http \
            --trigger-http \
            --allow-unauthenticated \
            --timeout=540s \
            --memory=4Gi \
            --set-env-vars PROJECT_ID=${{ env.PROJECT_ID }},GCS_BUCKET=${{ vars.BUCKET_NAME }},DATA_KEY=structured/datasets/listings_master_llm_enhanced.csv,MODEL_TYPE=random_forest,N_TRIALS=20
